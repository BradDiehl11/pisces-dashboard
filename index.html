<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pisces — Operator Performance</title>
<style>
/* ── CSS custom properties — all sizes derived from vmin so the layout
   scales proportionally from a 13" laptop (1366×768) to an 85" 4K TV ── */
:root{
  --navy:#0a1628;--card:#0f1f3d;--border:rgba(255,255,255,0.07);
  --green:#00d97e;--gold:#f5c518;--blue:#3b82f6;--purple:#a78bfa;
  --muted:rgba(255,255,255,0.4);

  /* base unit: 1% of the smaller viewport dimension */
  --u: 1vmin;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  background:var(--navy);color:#fff;
  font-family:'Segoe UI',system-ui,sans-serif;
  width:100vw;height:100vh;overflow:hidden;
  font-size:calc(0.9 * var(--u)); /* root em = ~0.9vmin */
}

/* ── SCREEN GRID ── */
.screen{
  display:grid;
  grid-template-rows: 5vh 10vh 1fr 1fr 1fr;
  height:100vh;
  gap:0.4vh;
  padding:0.4vh 0.8vw 1.8vh;
}

/* ── TOP BAR ── */
.topbar{display:grid;grid-template-columns:1fr 1fr 1fr;align-items:center;border-bottom:2px solid var(--green);padding-bottom:0.3vh;}
.tabs{display:flex;gap:0.4vw;}
.topbar-title{display:flex;align-items:center;justify-content:center;font-size:clamp(12px,2vmin,28px);font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--green);}
.tab{padding:0.3vh 1.2vw;border-radius:6px;cursor:pointer;font-size:clamp(9px,1.3vmin,18px);font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);background:transparent;border:1px solid transparent;transition:all .15s;}
.tab.nav-tab.active-nav{color:#fff;background:var(--blue);border-color:var(--blue);}
.tab.nav-tab:hover:not(.active-nav){color:#fff;border-color:rgba(59,130,246,.4);}
.clock-block{text-align:right;line-height:1.2;}
.clock{font-size:clamp(14px,2.8vmin,42px);font-weight:800;color:var(--green);font-variant-numeric:tabular-nums;}
.clock-date{font-size:clamp(8px,1.2vmin,18px);color:var(--muted);}
.clock-upd{font-size:clamp(7px,1vmin,14px);color:var(--muted);opacity:.7;}

/* ── HERO ROW ── */
.heroes{display:grid;grid-template-columns:repeat(4,1fr);gap:0.5vw;min-height:0;}
.winner-card{
  background:linear-gradient(135deg,#1a2e6b 0%,#0d1a3d 100%);
  border:1px solid rgba(245,197,24,.4);border-top:3px solid var(--gold);
  border-radius:7px;padding:0.6vh 1vw;
  display:flex;align-items:center;gap:1vw;overflow:hidden;min-width:0;
}
.winner-emoji{font-size:clamp(14px,3vmin,44px);flex-shrink:0;}
.winner-inner{display:flex;flex-direction:column;align-items:flex-start;min-width:0;}
.winner-label{font-size:clamp(6px,1.1vmin,16px);text-transform:uppercase;letter-spacing:.12em;color:var(--gold);font-weight:700;white-space:nowrap;}
.winner-name{font-size:clamp(16px,3.2vmin,52px);font-weight:900;line-height:1.05;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
.winner-stat{font-size:clamp(8px,1.3vmin,20px);color:var(--muted);margin-top:0.2vh;white-space:nowrap;}

/* ── METRIC ROWS ── */
.row{display:grid;grid-template-columns:repeat(3,1fr);gap:0.5vw;min-height:0;overflow:hidden;}
.panel{background:var(--card);border:1px solid var(--border);border-radius:7px;display:flex;flex-direction:column;overflow:hidden;min-height:0;}
.panel-head{display:flex;align-items:center;gap:0.5vw;padding:0.4vh 0.8vw;background:rgba(0,0,0,.2);border-bottom:1px solid var(--border);flex-shrink:0;}
.panel-wh{font-size:clamp(10px,1.5vmin,22px);font-weight:800;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.panel-num{font-size:clamp(12px,1.8vmin,28px);font-weight:800;font-variant-numeric:tabular-nums;flex-shrink:0;}
.panel-avghr{font-size:clamp(7px,1vmin,15px);color:var(--muted);flex-shrink:0;white-space:nowrap;}
.panel-body{flex:1;overflow:hidden;display:flex;flex-direction:column;justify-content:space-evenly;min-height:0;}

/* ── OPERATOR ROWS ── */
.op-row{display:flex;align-items:center;gap:0.4vw;padding:0 0.8vw;flex:1;min-height:0;max-height:10vh;}
.op-row.gold{background:rgba(245,197,24,.07);border-left:3px solid var(--gold);}
.op-rank{font-size:clamp(10px,1.4vmin,22px);color:var(--muted);width:1.6vmin;text-align:center;flex-shrink:0;font-weight:600;}
.op-crown{font-size:clamp(10px,1.4vmin,22px);width:1.6vmin;text-align:center;flex-shrink:0;}
.op-name{font-size:clamp(11px,1.9vmin,30px);font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.op-name.gold{color:var(--gold);font-weight:800;}
.op-hr{font-size:clamp(7px,1.1vmin,17px);color:var(--blue);font-weight:600;min-width:5vmin;text-align:right;flex-shrink:0;opacity:.9;}
.op-bar-wrap{width:6vmin;height:0.5vmin;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;flex-shrink:0;}
.op-bar{height:100%;border-radius:3px;transition:width .8s;}
.op-val{font-size:clamp(11px,1.9vmin,30px);font-weight:800;font-variant-numeric:tabular-nums;min-width:5vmin;text-align:right;flex-shrink:0;}
.op-val.gold{color:var(--gold);}
.wh-winchester .op-bar{background:var(--green);}
.wh-longmont   .op-bar{background:var(--blue);}
.wh-fortmyer   .op-bar{background:var(--purple);}

/* ── BOTTOM ROW ── */
#row-bottom{display:flex;gap:0.5vw;min-height:0;overflow:hidden;}
.shippers-grid{flex:1;display:grid;grid-template-columns:repeat(3,1fr);overflow:hidden;min-height:0;}
.shippers-col{display:flex;flex-direction:column;justify-content:space-evenly;border-right:1px solid var(--border);}
.shippers-col:last-child{border-right:none;}
.no-data{flex:1;display:flex;align-items:center;justify-content:center;font-size:clamp(9px,1.2vmin,16px);color:var(--muted);}
.loading{display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);gap:1vw;font-size:clamp(10px,1.4vmin,20px);}
.spinner{width:2.5vmin;height:2.5vmin;border:0.3vmin solid rgba(255,255,255,.1);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── STATUS BAR ── */
#status-bar{position:fixed;bottom:0;left:0;right:0;padding:0.3vh 1vw;font-size:clamp(7px,1vmin,13px);color:var(--muted);background:rgba(10,22,40,.85);display:flex;gap:1.5vw;align-items:center;}
#status-dot{width:0.8vmin;height:0.8vmin;min-width:6px;min-height:6px;border-radius:50%;background:#555;display:inline-block;margin-right:0.4vw;}
#status-dot.ok{background:var(--green);}
#status-dot.err{background:#ef4444;}
</style>
</head>
<body>
<div class="screen">
  <div class="topbar">
    <div class="tabs"><button class="tab nav-tab active-nav">WH</button></div>
    <div class="topbar-title">Warehouse Logistics</div>
    <div class="clock-block">
      <div class="clock" id="clock">--:-- --</div>
      <div class="clock-date" id="cdate"></div>
      <div class="clock-upd" id="cupd">Connecting…</div>
    </div>
  </div>
  <div class="heroes" id="heroes"><div class="loading"><div class="spinner"></div>Pulling data…</div></div>
  <div class="row" id="row-picked"></div>
  <div class="row" id="row-received"></div>
  <div id="row-bottom">
    <div id="shippers-panel" style="flex:1;min-width:0;min-height:0;overflow:hidden;"></div>
  </div>
</div>
<div id="status-bar">
  <span id="status-dot"></span>
  <span id="status-text">Initializing…</span>
  <span style="margin-left:auto" id="last-fetch-time"></span>
</div>

<script>
function loadScript(src){
  return new Promise((resolve,reject)=>{
    const s=document.createElement("script");
    s.src=src; s.onload=resolve; s.onerror=reject;
    document.head.appendChild(s);
  });
}

loadScript("https://unpkg.com/@azure/msal-browser@2.38.3/lib/msal-browser.min.js").then(function(){

/* ── CONFIG ── */
const CONFIG={
  clientId: "c2ad8d44-e25c-4cde-9dcd-42aafb05096e",
  tenantId: "825d358b-9b1a-4580-a5ef-ec1fb35fbda1",
  siteId:   "pisceshealthcom.sharepoint.com,d1e88d08-dc83-4eed-ab25-35e2018b15e9,1ba36505-4d34-4587-bdd7-f756fb78bc0d",
  warehouseListId: "2038d13f-ce6c-48fd-8165-dfa7b28522ef",
  pbListId:        "3f15fb92-89f1-4c67-b483-00c5435ae8f0",
  pollInterval: 60000,
};

/* ── MSAL ── */
const msalApp = new msal.PublicClientApplication({
  auth:{ clientId:CONFIG.clientId, authority:`https://login.microsoftonline.com/${CONFIG.tenantId}`, redirectUri:window.location.origin },
  cache:{ cacheLocation:"localStorage" },
});
const SCOPES=["https://graph.microsoft.com/Sites.Read.All"];

async function getToken(){
  const accounts=msalApp.getAllAccounts();
  if(accounts.length>0){
    try{ return (await msalApp.acquireTokenSilent({scopes:SCOPES,account:accounts[0]})).accessToken; }catch(e){}
  }
  return (await msalApp.loginPopup({scopes:SCOPES})).accessToken;
}

/* ── SHAREPOINT ── */
async function spGet(listId,select){
  const tok=await getToken();
  const res=await fetch(
    `https://graph.microsoft.com/v1.0/sites/${CONFIG.siteId}/lists/${listId}/items?expand=fields(select=${select})&$top=200`,
    {headers:{Authorization:`Bearer ${tok}`}}
  );
  if(!res.ok) throw new Error(`SP ${res.status}: ${await res.text()}`);
  return (await res.json()).value||[];
}

/* ── DATA TRANSFORM ── */
const WH=["Winchester","Longmont","Fort Myer"];
const WH_COLORS=["#00d97e","#3b82f6","#a78bfa"];

function pj(v){ if(!v) return {}; if(typeof v==="object") return v; try{return JSON.parse(v);}catch{return {};} }

function transformWH(items){
  const out={data:{today:{},week:{},month:{}},shippers:{today:{},week:{},month:{}},scraped_at:null};
  for(const item of items){
    const f=item.fields||{};
    const title=(f.Title||"").trim();
    const idx=title.lastIndexOf("_");
    if(idx===-1) continue;
    const wh=title.slice(0,idx), period=title.slice(idx+1);
    if(!["today","week","month"].includes(period)) continue;
    const sa=f.ScrapedAt||null;
    if(sa&&(!out.scraped_at||sa>out.scraped_at)) out.scraped_at=sa;
    if(wh==="Shippers"){
      for(const[n,v] of Object.entries(pj(f.ShipperData)))
        out.shippers[period][n]=(parseFloat(out.shippers[period][n])||0)+(parseFloat(v)||0);
      continue;
    }
    if(!WH.includes(wh)) continue;
    if(!out.data[period][wh]) out.data[period][wh]={};
    const wd=out.data[period][wh];
    wd["Units Picked"]                          =pj(f.PickerData);
    wd["Units Received (POs and RAs)"]          =pj(f.ReceiverData);
    wd["Units Picked Per Hour"]                 =pj(f.PickRateData);
    wd["Units Received Per Hour (POs and RAs)"] =pj(f.ReceiveRateData);
    wd["Units Shipped"]                         =parseFloat(f.UnitsShipped)||0;
    wd["Orders Shipped"]                        =parseFloat(f.OrdersShipped)||0;
    for(const[n,v] of Object.entries(pj(f.ShipperData)))
      out.shippers[period][n]=(parseFloat(out.shippers[period][n])||0)+(parseFloat(v)||0);
  }
  return out;
}

function transformPB(items){
  const pb={picking:{},receiving:{},shipped:{}};
  for(const item of items){
    const f=item.fields||{};
    const title=(f.Title||"").trim();
    const idx=title.lastIndexOf("_");
    let name,cat;
    if(idx!==-1){ name=title.slice(0,idx).trim(); cat=title.slice(idx+1).toLowerCase().trim(); }
    else { name=title; cat=(f.Category||"").toLowerCase().trim(); }
    const val=parseFloat(f.PersonalBest??f.Value)||0;
    if(name && cat in pb) pb[cat][name]=val;
  }
  return pb;
}

/* ── STATE ── */
let data=null, _recInt=null, _recIdx=0;

/* ── CLOCK ── */
function tick(){
  const n=new Date();
  document.getElementById("clock").textContent=n.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
  document.getElementById("cdate").textContent=n.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});
}
setInterval(tick,1000); tick();

/* ── STATUS ── */
function setStatus(ok,msg){
  document.getElementById("status-dot").className=ok?"ok":"err";
  document.getElementById("status-text").textContent=msg;
}

/* ── FETCH ── */
async function fetchAndRender(){
  try{
    setStatus(true,"Fetching from SharePoint…");
    const[whItems,pbItems]=await Promise.all([
      spGet(CONFIG.warehouseListId,"Title,ScrapedAt,UnitsPicked,UnitsShipped,OrdersShipped,UnitsReceived,PickerData,ReceiverData,PickRateData,ReceiveRateData,ShipperData"),
      spGet(CONFIG.pbListId,"Title,Category,PersonalBest"),
    ]);
    const t=transformWH(whItems);
    t.personal_bests=transformPB(pbItems);
    data=t;
    document.getElementById("cupd").textContent=data.scraped_at
      ?"Scraped "+new Date(data.scraped_at).toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",second:"2-digit"})
      :"Data loaded";
    document.getElementById("last-fetch-time").textContent="Fetched "+new Date().toLocaleTimeString();
    setStatus(true,"Connected to SharePoint");
    render(data);
  }catch(e){
    console.error("fetchAndRender:",e);
    setStatus(false,"Error: "+e.message);
    document.getElementById("cupd").textContent="⚠ Fetch error — retrying…";
  }
}

msalApp.handleRedirectPromise().then(()=>{
  setInterval(fetchAndRender,CONFIG.pollInterval);
  fetchAndRender();
});

/* ── HELPERS ── */
function formatName(n){
  if(!n) return n;
  const p=n.split(/[\s._]+/).filter(Boolean);
  if(p.length<2) return p[0]||n;
  return p[0]+" "+p[p.length-1][0].toUpperCase()+".";
}
const fmt=v=>{ const n=parseFloat(v); return isNaN(n)?"—":Number.isInteger(n)?n.toLocaleString():n.toFixed(1); };
const wdat=(wh,m)=>{ try{return data.data["today"][wh][m]||{};}catch{return {};} };
const sops=d=>Object.entries(d).map(([n,v])=>({n,v:parseFloat(v)||0})).filter(o=>o.v>0).sort((a,b)=>b.v-a.v);
function globalWinner(metric){
  let best=null;
  for(const wh of WH) for(const[n,v] of Object.entries(wdat(wh,metric)))
    if(!best||parseFloat(v)>best.v) best={n,v:parseFloat(v)||0,wh};
  return best;
}

/* ── RENDER ── */
function render(d){ renderHeroes(d); renderMetricRow("row-picked","Units Picked","var(--green)"); renderMetricRow("row-received","Units Received (POs and RAs)","var(--blue)"); renderBottomRow(d); }

function renderHeroes(d){
  const pw=globalWinner("Units Picked");
  const rw=globalWinner("Units Received (POs and RAs)");
  const topShipper=Object.entries(d.shippers?.today||{}).map(([n,v])=>({n,v:parseFloat(v)||0})).filter(o=>o.v>0).sort((a,b)=>b.v-a.v)[0]||null;
  const pb=d.personal_bests||{};

  const topOf=obj=>{ if(!obj) return null; const e=Object.entries(obj).map(([n,v])=>({n,v:parseFloat(v)||0})).filter(o=>o.v>0); return e.length?e.reduce((a,b)=>b.v>a.v?b:a):null; };
  const recPick=topOf(pb.picking);
  const recRecv=topOf(pb.receiving);
  const recShip=topOf(pb.shipped);

  document.getElementById("heroes").innerHTML=`
    <div class="winner-card">
      <div class="winner-emoji">👑</div>
      <div class="winner-inner">
        <div class="winner-label">🏆 Today's Top Picker</div>
        <div class="winner-name">${pw?formatName(pw.n):"—"}</div>
        <div class="winner-stat">${pw?fmt(pw.v)+" units picked":"No data"}</div>
      </div>
    </div>
    <div class="winner-card">
      <div class="winner-emoji">🏭</div>
      <div class="winner-inner">
        <div class="winner-label">🏭 Today's Top Receiver</div>
        <div class="winner-name">${rw?formatName(rw.n):"—"}</div>
        <div class="winner-stat">${rw?fmt(rw.v)+" units received":"No data"}</div>
      </div>
    </div>
    <div class="winner-card">
      <div class="winner-emoji">📦</div>
      <div class="winner-inner">
        <div class="winner-label">📦 Today's Top Shipper</div>
        <div class="winner-name">${topShipper?formatName(topShipper.n):"—"}</div>
        <div class="winner-stat">${topShipper?fmt(topShipper.v)+" shipments":"No data"}</div>
      </div>
    </div>
    <div class="winner-card" id="rec-card" style="opacity:0;transition:opacity 0.4s ease;">
      <div class="winner-emoji" id="rec-emoji"></div>
      <div class="winner-inner">
        <div class="winner-label" id="rec-label"></div>
        <div class="winner-name" id="rec-name"></div>
        <div class="winner-stat" id="rec-stat"></div>
      </div>
    </div>`;

  startRecRotation([
    {emoji:'🏃',label:'All-Time Record — Picking',   n:recPick?formatName(recPick.n):'No record yet', stat:recPick?fmt(recPick.v)+' units picked':'—'},
    {emoji:'📦',label:'All-Time Record — Receiving', n:recRecv?formatName(recRecv.n):'No record yet', stat:recRecv?fmt(recRecv.v)+' units received':'—'},
    {emoji:'🚚',label:'All-Time Record — Shipping',  n:recShip?formatName(recShip.n):'No record yet', stat:recShip?fmt(recShip.v)+' shipments':'—'},
  ]);
}

function startRecRotation(slides){
  if(_recInt) clearInterval(_recInt);
  _recIdx=0;
  function show(){
    const el=document.getElementById('rec-card'); if(!el){clearInterval(_recInt);return;}
    const s=slides[_recIdx%slides.length];
    el.style.opacity='0';
    setTimeout(()=>{
      document.getElementById('rec-emoji').textContent=s.emoji;
      document.getElementById('rec-label').textContent=s.label;
      document.getElementById('rec-name').textContent=s.n;
      document.getElementById('rec-stat').textContent=s.stat;
      el.style.opacity='1';
      _recIdx=(_recIdx+1)%slides.length;
    },220);
  }
  show(); _recInt=setInterval(show,4000);
}

function renderMetricRow(rowId,metric,rowColor){
  const rateMetric=metric==="Units Picked"?"Units Picked Per Hour":"Units Received Per Hour (POs and RAs)";
  document.getElementById(rowId).innerHTML=WH.map((wh,i)=>{
    const ops=sops(wdat(wh,metric));
    const total=ops.reduce((s,o)=>s+o.v,0);
    const maxV=ops.length?ops[0].v:1;
    const color=rowColor||WH_COLORS[i];
    const whCls={Winchester:'wh-winchester',Longmont:'wh-longmont','Fort Myer':'wh-fortmyer'}[wh]||'';
    const rateMap=wdat(wh,rateMetric);
    const avgOps=sops(rateMap);
    const avgSum=avgOps.reduce((a,o)=>a+o.v,0);
    const rows=ops.length===0
      ?`<div class="no-data">No data</div>`
      :ops.map((op,j)=>{
          const gold=j===0;
          const pct=Math.round(op.v/maxV*100);
          const hr=rateMap[op.n]?fmt(rateMap[op.n]):null;
          return `<div class="op-row ${gold?"gold":""}">
            ${gold?`<span class="op-crown">👑</span>`:`<span class="op-rank">${j+1}</span>`}
            <span class="op-name ${gold?"gold":""}">${formatName(op.n)}</span>
            ${hr?`<span class="op-hr">${hr}/hr</span>`:""}
            <div class="op-bar-wrap"><div class="op-bar" style="width:${pct}%"></div></div>
            <span class="op-val ${gold?"gold":""}">${fmt(op.v)}</span>
          </div>`;
        }).join("");
    return `<div class="panel ${whCls}" style="border-top:2px solid ${color}">
      <div class="panel-head">
        <span class="panel-wh">${wh} ${metric==="Units Picked"?"Picking":"Receiving"}</span>
        <span class="panel-num" style="color:${color}">${fmt(total)}</span>
        ${avgSum>0?`<span class="panel-avghr">${fmt(avgSum)} avg/hr</span>`:""}
      </div>
      <div class="panel-body">${rows}</div>
    </div>`;
  }).join("");
}

function renderBottomRow(d){
  const shippers=Object.entries(d.shippers?.today||{}).map(([n,v])=>({n,v:parseFloat(v)||0})).filter(o=>o.v>0).sort((a,b)=>b.v-a.v);
  const maxV=shippers.length?shippers[0].v:1;
  const total=shippers.reduce((s,o)=>s+o.v,0);
  const perCol=Math.ceil(shippers.length/3)||1;
  const cols=[[],[],[]];
  shippers.forEach((op,j)=>cols[Math.min(2,Math.floor(j/perCol))].push({op,j}));
  const body=shippers.length===0
    ?`<div class="no-data">Shipper data not yet loaded</div>`
    :`<div class="shippers-grid">${cols.map(col=>`<div class="shippers-col">${col.map(({op,j})=>{
        const gold=j===0, pct=Math.round(op.v/maxV*100);
        return `<div class="op-row ${gold?"gold":""}">
          ${gold?`<span class="op-crown">👑</span>`:`<span class="op-rank">${j+1}</span>`}
          <span class="op-name ${gold?"gold":""}">${formatName(op.n)}</span>
          <div class="op-bar-wrap"><div class="op-bar" style="width:${pct}%;background:${gold?"var(--gold)":"var(--purple)"}"></div></div>
          <span class="op-val ${gold?"gold":""}">${fmt(op.v)}</span>
        </div>`;
      }).join("")}</div>`).join("")}</div>`;
  document.getElementById("shippers-panel").innerHTML=
    `<div class="panel" style="border-top:2px solid var(--purple);height:100%;">
      <div class="panel-head">
        <span class="panel-wh">📦 Individual Shippers — Today</span>
        <span class="panel-num" style="color:var(--purple)">${fmt(total)}</span>
      </div>
      <div class="panel-body" style="padding:0;">${body}</div>
    </div>`;
}

}).catch(function(e){
  document.getElementById("status-dot").className="err";
  document.getElementById("status-text").textContent="Failed to load auth library";
  console.error("MSAL load error:",e);
});
</script>
</body>
</html>
